name: smart_microbus
description: "Smart Microbus Application."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

# =========================
# Dependencies
# =========================
dependencies:
  bloc: ^9.0.0
  build_runner: ^2.6.0
  cached_network_image: ^3.4.1
  dartz: ^0.10.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  flutter_screenutil: ^5.9.3
  pretty_dio_logger: ^1.4.0
  retrofit: ^4.6.0
  retrofit_generator: ^10.0.0

  cupertino_icons: ^1.0.8
  dio: ^5.9.1
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_localizations:
    sdk: flutter
  get_it: ^9.2.0
  google_fonts: ^8.0.1
  intl: ^0.20.2
  json_annotation: ^4.10.0
  json_serializable: ^6.12.0
  jwt_decoder: ^2.0.1
  shared_preferences: ^2.5.3

# =========================
# Dev Dependencies
# =========================
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

# =========================
# Flutter Section
# =========================
flutter:
  uses-material-design: true

  # 🔥 تفعيل توليد ملفات الترجمة
  generate: true
